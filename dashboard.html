<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
   <link rel="stylesheet" href="style1.css">

  <style>
    body {
      font-family: Arial;
      transition: 0.3s;
    }

    .dark {
      background-color: #121212;
      color: white;
    }

    img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
    }
  </style>

</head>
<body>

  <h1 id="welcome"></h1>

  <!-- Dark Mode -->
  <button onclick="toggleDark()">🌙 Toggle Dark Mode</button>

  <br><br>

  <!-- Profile Picture -->
  <h3>Profile Picture</h3>
  <input type="file" id="profilePic">
  <br><br>
  <img id="preview" src="">

  <br><br>

  <!-- Notes -->
  <h3>My Notes</h3>
  <input type="text" id="noteInput" placeholder="Write a note">
  <button onclick="addNote()">Add</button>

  <ul id="notesList"></ul>

  <br>

  <button onclick="logout()">Logout</button>

  <script>
    const loggedInUser = localStorage.getItem("loggedInUser");

    if (!loggedInUser) {
      window.location.href = "login.html";
    }

    document.getElementById("welcome").innerText =
      "Welcome " + loggedInUser;

    // 🌙 Dark Mode
    function toggleDark() {
      document.body.classList.toggle("dark");
      localStorage.setItem("darkMode", document.body.classList.contains("dark"));
    }

    // load dark mode
    if (localStorage.getItem("darkMode") === "true") {
      document.body.classList.add("dark");
    }

    // 🖼 Profile Picture
    const picInput = document.getElementById("profilePic");
    const preview = document.getElementById("preview");

    // load saved image
    const savedPic = localStorage.getItem(loggedInUser + "_pic");
    if (savedPic) {
      preview.src = savedPic;
    }

    picInput.addEventListener("change", function () {
      const file = picInput.files[0];
      const reader = new FileReader();

      reader.onload = function () {
        preview.src = reader.result;
        localStorage.setItem(loggedInUser + "_pic", reader.result);
      };

      if (file) reader.readAsDataURL(file);
    });

    // 📝 Notes
    function addNote() {
      const input = document.getElementById("noteInput");
      const note = input.value;

      if (!note) return;

      let notes = JSON.parse(localStorage.getItem(loggedInUser + "_notes")) || [];

      notes.push(note);
      localStorage.setItem(loggedInUser + "_notes", JSON.stringify(notes));

      input.value = "";
      displayNotes();
    }

    function displayNotes() {
      const list = document.getElementById("notesList");
      list.innerHTML = "";

      let notes = JSON.parse(localStorage.getItem(loggedInUser + "_notes")) || [];

      notes.forEach((n, index) => {
        const li = document.createElement("li");
        li.innerText = n;

        const delBtn = document.createElement("button");
        delBtn.innerText = "❌";
        delBtn.onclick = function () {
          notes.splice(index, 1);
          localStorage.setItem(loggedInUser + "_notes", JSON.stringify(notes));
          displayNotes();
        };

        li.appendChild(delBtn);
        list.appendChild(li);
      });
    }

    displayNotes();

    // 🚪 Logout
    function logout() {
      localStorage.removeItem("loggedInUser");
      window.location.href = "login.html";
    }
  </script>

</body>
</html>
